<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Champ Select</title>
    <link rel="stylesheet" href="sdpi.css">
</head>
<body>
    <div class="sdpi-wrapper" id="mainSettings">
        <div type="select" class="sdpi-item" id="select_summoner">
            <div class="sdpi-item-label">Enemy</div>
            <select class="sdpi-item-value select sdProperty" id="summoner" oninput="setSettings()">
                <option value="0">Enemy 1</option>
                <option value="1">Enemy 2</option>
                <option value="2">Enemy 3</option>
                <option value="3">Enemy 4</option>
                <option value="4">Enemy 5</option>
            </select>
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Info</div>
            <div class="sdpi-item-value">
                <span>Shows the selected enemy's champion pick during champion select. Place 5 buttons (Enemy 1-5) for full coverage.</span>
            </div>
        </div>
    </div>
    <script src="sdtools.common.js"></script>
</body>
</html>
